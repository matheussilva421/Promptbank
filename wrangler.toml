name = "promptbank"
compatibility_date = "2026-03-02"
main = "worker.js"

[[kv_namespaces]]
binding = "PROMPTBANK_KV"
id = "f7a7ead8912145ff8c764ae1277e16c9"

[vars]
# Defina no dashboard/secrets em produção (ex: "https://seu-app.pages.dev")
# ALLOWED_ORIGIN = "*"
KV_KEY = "banco_prompts_v3"

[assets]
directory = "."
binding = "ASSETS"
not_found_handling = "single-page-application"
exclude = [
  ".git/**",
  ".wrangler/**",
  "docs/**",
  "scripts/**",
  "README.md",
  "CONTRIBUTING.md",
  "wrangler.toml",
  "worker.js",
]
