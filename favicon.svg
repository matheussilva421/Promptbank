<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D3489" />
      <stop offset="100%" stop-color="#14B2E4" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#14B2E4" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100" height="100" rx="28" fill="url(#logoGrad)" />
  <!-- Terminal Prompt Arrow -->
  <path d="M 30 25 L 55 50 L 30 75" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Data/Bank Bars -->
  <rect x="62" y="38" width="12" height="12" rx="3" fill="url(#glow)" filter="url(#neonGlow)" />
  <rect x="62" y="58" width="12" height="12" rx="3" fill="#FFFFFF" />
</svg>
